name: Build All Platforms

on:
  push:
    branches:
      - main
      - ci/test-autobuild
  pull_request:
    types:
      - opened
      - reopened
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-zos:
    name: Build Zeal 8-bit OS
    uses: ./.github/workflows/build-zos.yml
    
    strategy:
      matrix:
        include:
          - target: zeal8bit
            config-path: configs/zeal8bit/hw_zvb.conf
            artifact-name: zos_target_zeal8bit_hw_zvb
            romdisk: true
          - target: zeal8bit emulator
            config-path: configs/zeal8bit/emu_zvb.conf
            artifact-name: zos_target_zeal8bit_emulator
            romdisk: true
          - target: zeal8bit UART only
            config-path: configs/zeal8bit/hw_uart.conf
            artifact-name: zos_target_zeal8bit_hw_uart
            romdisk: true
          - target: agon
            config-path: configs/agon/hw.conf
            artifact-name: zos_target_agon
            romdisk: false
          - target: trs80
            config-path: configs/trs80/hw.conf
            artifact-name: zos_target_trs80
            romdisk: false
    with:
      target: ${{ matrix.target }}
      config-path: ${{ matrix.config-path }}
      artifact-name: ${{ matrix.artifact-name }}
      romdisk: ${{ matrix.romdisk }}

  create-release:
    name: Create Draft Release
    needs: [build-zos]
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release Archives
        run: |
          cd artifacts
          for dir in */; do
            # Remove trailing slash
            name="${dir%/}"
            echo "Packaging $name..."
            # Create a zip with the same name as the folder
            (cd "$name" && zip -r "../${name}.zip" .)
          done
          cd ..

      - name: Generate Release Info
        id: tag
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "release_date=$(date -u +"%Y-%m-%d %H:%M UTC")" >> $GITHUB_OUTPUT

      - name: Delete Existing Draft Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "latest" --yes || true

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Latest build (${{ steps.tag.outputs.sha }})
          body: |
            Built from commit: ${{ steps.tag.outputs.sha }}
            Branch: ${{ github.ref_name }}
            Date: ${{ steps.tag.outputs.release_date }}
          tag_name: latest
          preserve_order: true
          generate_release_notes: true
          files: "artifacts/*.zip"
